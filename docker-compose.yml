services:
  linearcast:
    image: ghcr.io/tckrcr/linearcast:latest
    container_name: linearcast
    pull_policy: always
    command: ["serve"]
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      LINEARCAST_DB: /data/linearcast/linearcast.db
      CACHE_DIR: /data/linearcast/cache
      LINEARCAST_ADDR: :8888
      TZ: "${TZ:-UTC}"
    volumes:
      - ${LINEARCAST_DATA_DIR:-/data/linearcast}:/data/linearcast
      - ${LINEARCAST_MEDIA_ROOT:-/data/media}:/data/media:ro
    ports:
      - "${WEB_UI_PORT:-8080}:8080"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
