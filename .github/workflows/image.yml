name: image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG:-${DISPATCH_TAG:-}}"
          if [ -z "$tag" ]; then
            echo "release tag or workflow_dispatch tag input is required" >&2
            exit 1
          fi
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "tag must look like vX.Y.Z: $tag" >&2
              exit 1
              ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Go tests
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Web UI typecheck
        run: |
          cd web-ui
          npm ci
          npm run typecheck

      - name: Build container image
        run: DOCKER_BUILDKIT=1 docker compose build

      - name: Release smoke test
        run: scripts/ci-stack-smoke.sh --project "linearcast-ghcr-${GITHUB_RUN_ID}" --timeout 60

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

      - name: Push container image
        env:
          TAG: ${{ steps.ref.outputs.tag }}
          IMAGE: ghcr.io/tckrcr/linearcast
        run: |
          set -euo pipefail

          docker tag linearcast:local "${IMAGE}:${TAG}"
          docker tag linearcast:local "${IMAGE}:latest"

          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

          echo "pushed ${IMAGE}:${TAG}"
